<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inana Food Company</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">

<body>

    <section class="story-section">

            <br>

            <div class="story-content" data-aos="fade-up" data-aos-duration="1200">

            <div class="story-content" data-aos="fade-up" data-aos-duration="1400">

            <br>
            <br>

            </div>
            <br>

            <div class="story-content" data-aos="fade-up" data-aos-duration="1400">
                <img src="images/text 5billion.png" alt="Story Content">
            </div>
            <br>

            <div class="story-content" data-aos="fade-up" data-aos-duration="1400">

    <!-- AOS SCRIPT -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true, // animation happens only once
            offset: 100, // offset from bottom of screen
        });
